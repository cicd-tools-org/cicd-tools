---
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.23.0
    hooks:
      - id: check-metaschema
        name: check-schema
        files: "^cicd-tools/boxes/[\\d\\.]+/schemas/.*\\.json$"
        stages: [commit]
      - id: check-jsonschema
        name: check-cookiecutter-schema
        files: "^(cookiecutter\\.json|\\.github/scenarios/.*\\.json)$"
        args:
          - "--schemafile"
          - ".cicd-tools/boxes/bootstrap/schemas/cookiecutter.json"
        stages: [commit]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.2.2
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort (python)
        types: []
        files: "^.+\\.pyi?$"
        stages: [pre-commit]
  - repo: https://github.com/cicd-tools-org/pre-commit.git
    rev:  0.5.0
    hooks:
      - id: format-shell
        args:
          - "-w"
          - "--indent=2"
          - "-ci"
          - "-sr"
        exclude: "^{{cookiecutter\\.project_slug}}/.+$|^\\.cicd-tools/boxes/.+$"
      - id: git-conflict-markers
        exclude: "^.+/fixtures/invalid_makefile_\\d+\\.txt"
        pass_filenames: true
      - id: format-toml
      - id: lint-github-workflow
        exclude: "^{{cookiecutter\\.project_slug}}/.+$"
      - id: lint-github-workflow-header
        exclude: "^{{cookiecutter\\.project_slug}}/.+$"
      - id: lint-markdown
        args:
          - "-c"
          - "{{cookiecutter.project_slug}}/.markdownlint.yml"
        exclude: "^{{cookiecutter\\.project_slug}}/.+$"
      - id: lint-shell
        args:
          - "--color=always"
          - "--source-path=SCRIPTDIR"
          - "--exclude=SC2317"
          - "-x"
        exclude: "^{{cookiecutter\\.project_slug}}/.+$|^\\.cicd-tools/boxes/.+$"
      - id: security-credentials
      - id: spelling-commit-message
      - id: spelling-markdown
        exclude: "^{{cookiecutter\\.project_slug}}/.+$"
      - id: spelling-vale-sync
      - id: spelling-vale-vocab
      - id: poetry-lint-python
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0
    hooks:
      - id: yamllint
        args:
          - "-c"
          - "./{{cookiecutter.project_slug}}/.yamllint.yml"
        exclude: "^{{cookiecutter\\.project_slug}}/.+$"
        stages: [pre-commit]
  - repo: https://github.com/google/yapf
    rev: v0.40.2
    hooks:
      - id: yapf
        name: "yapf"
        args:
          - "-i"
          - "--parallel"
        types: []
        files: "^.+\\.pyi?$"
        stages: [pre-commit]
        require_serial: true
  - repo: local
    hooks:
      - id: lint-makefile
        name: lint-makefile
        entry: .cicd-tools/boxes/bootstrap/pre-commit/lint-makefile.sh
        language: system
        files: "^(.+/)*Makefile$"
        pass_filenames: true
        stages: [pre-commit]
