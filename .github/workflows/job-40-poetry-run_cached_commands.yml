---
name: job-40-poetry-run_cached_commands

# Consuming Projects Must Implement:
# - ./.github/scripts/step-setup-environment.sh

on:
  workflow_call:
    inputs:
      COMMANDS:
        description: "A newline separated string containing the commands to execute."
        required: true
        type: string
      COMMAND_PREFIX:
        default: "poetry run"
        description: "A prefix to give each command before it is executed in the shell."
        required: false
        type: string
      CONCURRENCY:
        description: "The maximum allowable parallel executions."
        required: true
        type: number
      ERROR_COMMAND:
        default: ""
        description: "Optional, a command to run if the workflow fails."
        required: false
        type: string
      EXECUTION_PATH:
        default: "."
        description: "Optional, allows you to specify a path to execute the command in."
        required: false
        type: string
      PYTHON_VERSIONS:
        description: "A string encoded JSON array of valid python versions."
        required: true
        type: string
      PLATFORM:
        default: "ubuntu-latest"
        description: "Optional, allows you to specify the OS platform that will be used to run the molecule command."
        required: false
        type: string
      POST_COMMAND:
        default: ""
        description: "Optional, a command to run after the poetry commands execute."
        required: false
        type: string
      PRE_COMMAND:
        default: ""
        description: "Optional, a command to run before the poetry commands execute."
        required: false
        type: string
      REMOTE_SCRIPT_SET_VALUE:
        default: "ci/github/scripts/step-set-value.sh"
        description: "Optional, allows you to specify a workflow set value script."
        required: false
        type: string
      SECRET_CONTENT_FILENAME:
        default: ""
        description: "Optional, allows you to write the content of 'secrets.FILE_CONTENT' to the given filename before command execution."
        required: false
        type: string
      TESTING_MODE:
        default: false
        description: "Optional, allows you to test a workflow failure."
        required: false
        type: boolean
      VERBOSE_NOTIFICATIONS:
        default: false
        description: "Optional, allows you to adjust the notification verbosity."
        required: false
        type: boolean
      WORKFLOW_NAME:
        default: ""
        description: "Identifies this workflow in notifications."
        required: false
        type: string
    secrets:
      FILE_CONTENT:
        description: "Optional, content to write to a selected file before command execution."
        required: false
      SLACK_WEBHOOK:
        description: "Optional, enables Slack notifications."
        required: false

jobs:

  poetry_command_sequence:

    runs-on: ${{ inputs.PLATFORM }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ${{ fromJSON(inputs.PYTHON_VERSIONS) }}
      max-parallel: ${{ inputs.CONCURRENCY }}

    steps:
      - name: Poetry Command Sequence -- Checkout Repository
        uses: actions/checkout@v3

      - name: Poetry Command Sequence -- Setup Environment
        env:
          WORKFLOW_NAME: ${{ inputs.WORKFLOW_NAME }}
        run: |
          bash "./.github/scripts/step-setup-environment.sh"
        shell: bash

      - name: Poetry Command Sequence -- Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Poetry Command Sequence -- Install Toolbox
        uses: ./.github/actions/action-00-toolbox

      - name: Poetry Command Sequence -- Install Project Dependencies
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-05-poetry-dependencies

      - name: Poetry Command Sequence -- Write to '${{ inputs.SECRET_CONTENT_FILENAME }}'
        if: inputs.SECRET_CONTENT_FILENAME != ''
        run: |
          echo "${FILE_CONTENT}" > "${{ inputs.SECRET_CONTENT_FILENAME }}"
        env:
          FILE_CONTENT: ${{ secrets.FILE_CONTENT }}

      - name: Poetry Command Sequence -- PRE_COMMAND > '${{ inputs.PRE_COMMAND }}'
        if: inputs.PRE_COMMAND != ''
        run: |
          ${{ inputs.PRE_COMMAND }}
        shell: bash

      - name: Poetry Command Sequence -- Execute Commands
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-20-generic-serial_commands
        with:
          COMMAND_PREFIX: ${{ inputs.COMMAND_PREFIX }}
          COMMANDS: ${{ inputs.COMMANDS }}
          EXECUTION_PATH: ${{ inputs.EXECUTION_PATH }}

      - name: Poetry Command Sequence -- POST_COMMAND > '${{ inputs.POST_COMMAND }}'
        if: inputs.POST_COMMAND != ''
        run: |
          ${{ inputs.POST_COMMAND }}
        shell: bash

      - name: Poetry Command Sequence -- Report Job Status on Success
        if: inputs.VERBOSE_NOTIFICATIONS == true
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-00-generic-notification
        with:
          NOTIFICATION_MESSAGE: "Poetry Command Sequence has passed!"
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Poetry Command Sequence -- Report Job Status on Failure
        if: failure() || inputs.TESTING_MODE == true
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-00-generic-notification
        with:
          NOTIFICATION_EMOJI: ":x:"
          NOTIFICATION_MESSAGE: "Poetry Command Sequence has failed!"
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          TESTING_MODE: ${{ inputs.TESTING_MODE }}

      - name: Poetry Command Sequence -- ERROR_COMMAND > '${{ inputs.ERROR_COMMAND }}'
        if: failure() && inputs.ERROR_COMMAND != ''
        run: |
          ${{ inputs.ERROR_COMMAND }}
        shell: bash
