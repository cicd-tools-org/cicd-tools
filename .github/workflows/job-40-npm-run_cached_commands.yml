---
name: job-40-npm-run_cached_commands

# Consuming Projects Must Implement:
# - ./.github/scripts/step-setup-environment.sh

on:
  workflow_call:
    inputs:
      ADDITIONAL_CACHE_PATHS:
        default: ""
        description: "Optional, allows you to specify additional paths to add to the NPM cache."
        required: false
        type: string
      COMMANDS:
        description: "A newline separated string containing the NPM commands you wish to run. (ie. build, test)."
        required: true
        type: string
      COMMAND_PREFIX:
        default: "npm run"
        description: "A prefix to give each command before it is executed in the shell."
        required: false
        type: string
      CONCURRENCY:
        description: "The maximum allowable parallel executions."
        required: true
        type: number
      DEBUG:
        default: false
        description: "Optional, allows you to troubleshoot failed workflow runs with tmate."
        required: false
        type: boolean
      ERROR_COMMAND:
        default: ""
        description: "Optional, a command to run if the workflow fails."
        required: false
        type: string
      EXECUTION_PATH:
        default: "."
        description: "Optional, allows you to specify a path to execute the command in."
        required: false
        type: string
      NODE_MODULES_PATH:
        default: "node_modules"
        description: "Optional, allows you to override the target folder that will be cached."
        required: false
        type: string
      POST_COMMAND:
        default: ""
        description: "Optional, a command to run after the npm commands execute."
        required: false
        type: string
      PRE_COMMAND:
        default: ""
        description: "Optional, a command to run before the npm commands execute."
        required: false
        type: string
      SECRET_CONTENT_FILENAME:
        default: ""
        description: "Optional, allows you to write the content of 'secrets.FILE_CONTENT' to the given filename before command execution."
        required: false
        type: string
      TESTING_MODE:
        default: false
        description: "Optional, allows you to test a workflow failure."
        required: false
        type: boolean
      VERBOSE_NOTIFICATIONS:
        default: false
        description: "Optional, allows you to adjust the notification verbosity."
        required: false
        type: boolean
      WORKFLOW_NAME:
        default: ""
        description: "Identifies this workflow in notifications."
        required: false
        type: string
    secrets:
      ENV_SECRET_1:
        description: "Optional, content to save to the environment."
        required: false
      ENV_SECRET_2:
        description: "Optional, content to save to the environment."
        required: false
      ENV_SECRET_3:
        description: "Optional, content to save to the environment."
        required: false
      FILE_CONTENT:
        description: "Optional, content to write to a selected file before command execution."
        required: false
      SLACK_WEBHOOK:
        description: "Optional, enables Slack notifications."
        required: false

env:
  ENV_SECRET_1: ${{ secrets.ENV_SECRET_1 }}
  ENV_SECRET_2: ${{ secrets.ENV_SECRET_2 }}
  ENV_SECRET_3: ${{ secrets.ENV_SECRET_3 }}

jobs:

  run_npm_command:

    runs-on: ubuntu-latest
    steps:
      - name: NPM Command Sequence -- Checkout Repository
        uses: actions/checkout@v4

      - name: NPM Command Sequence -- Setup Environment
        env:
          WORKFLOW_NAME: ${{ inputs.WORKFLOW_NAME }}
        run: |
          bash "./.github/scripts/step-setup-environment.sh"
        shell: bash

      - name: NPM Command Sequence -- Set up Node From 'package.json'
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: NPM Command Sequence -- Install Toolbox
        uses: ./.github/actions/action-00-toolbox

      - name: NPM Command Sequence -- Install Packages with NPM
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-05-npm-dependencies
        with:
          ADDITIONAL_CACHE_PATHS: ${{ inputs.ADDITIONAL_CACHE_PATHS }}
          NODE_MODULES_PATH: ${{ inputs.NODE_MODULES_PATH }}

      - name: NPM Command Sequence -- Write to '${{ inputs.SECRET_CONTENT_FILENAME }}'
        if: inputs.SECRET_CONTENT_FILENAME != ''
        run: |
          echo "${FILE_CONTENT}" > "${{ inputs.SECRET_CONTENT_FILENAME }}"
        env:
          FILE_CONTENT: ${{ secrets.FILE_CONTENT }}

      - name: NPM Command Sequence -- PRE_COMMAND > '${{ inputs.PRE_COMMAND }}'
        if: inputs.PRE_COMMAND != ''
        run: |
          ${{ inputs.PRE_COMMAND }}
        shell: bash

      - name: NPM Command Sequence -- Execute Commands
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-20-generic-serial_commands
        with:
          COMMAND_PREFIX: ${{ inputs.COMMAND_PREFIX }}
          COMMANDS: ${{ inputs.COMMANDS }}
          EXECUTION_PATH: ${{ inputs.EXECUTION_PATH }}

      - name: NPM Command Sequence -- POST_COMMAND > '${{ inputs.POST_COMMAND }}'
        if: inputs.POST_COMMAND != ''
        run: |
          ${{ inputs.POST_COMMAND }}
        shell: bash

      - name: NPM Command Sequence -- Report Job Status on Success
        if: inputs.VERBOSE_NOTIFICATIONS == true
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-00-generic-notification
        with:
          NOTIFICATION_MESSAGE: "NPM Command Sequence has succeeded!"
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: NPM Command Sequence -- Report Job Status on Failure
        if: failure() || inputs.TESTING_MODE == true
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-00-generic-notification
        with:
          NOTIFICATION_EMOJI: ":x:"
          NOTIFICATION_MESSAGE: "NPM Command Sequence has failed!"
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          TESTING_MODE: ${{ inputs.TESTING_MODE }}

      - name: NPM Command Sequence -- ERROR_COMMAND > '${{ inputs.ERROR_COMMAND }}'
        if: failure() && inputs.ERROR_COMMAND != ''
        run: |
          ${{ inputs.ERROR_COMMAND }}
        shell: bash

      - name: NPM Command Sequence -- Troubleshoot on Failure
        if: failure()
        uses: ./.cicd-tools/boxes/active/ci/github/actions/action-01-generic-debug
        with:
          ENABLE: ${{ inputs.DEBUG }}

      - name: Upload Build Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: "*.png"
